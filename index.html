<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE 2 - Ladder Tracker</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2b2b2b;
            --text-main: #e4e4e4;
            --text-muted: #a0a0a0;
            --accent: #555555;
            --accent-hover: #777777;
            --border-color: #333333;
            --danger: #d9534f;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* Card Layouts for Visual Clarity */
        .controls-frame, .search-frame, #raceModeContainer {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        /* Form Controls */
        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"], select {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-hover);
        }

        /* Checkbox Styling */
        .checkbox-container {
            justify-content: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-main);
        }

        /* Buttons */
        button {
            background: var(--accent);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: var(--bg-input);
            color: var(--text-muted);
            border-color: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        #stopBtn {
            background: var(--danger);
            color: #ffffff;
            border-color: var(--danger);
        }

        #fetchBtn {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .full-width-btn {
            width: 100%;
            margin-top: 16px;
        }

        /* Search Row Specifics */
        .search-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 8px;
        }

        #charNameInput {
            flex-grow: 1;
        }

        /* Results & Status */
        .status-bar {
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        #resultsBox {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            min-height: 100px;
            margin-bottom: 20px;
            white-space: nowrap; /* Prevents column headers from wrapping */
            overflow-x: auto; /* Adds a scrollbar if the window gets too narrow */
        }

        #showMoreBtn {
            width: 100%;
            margin-bottom: 20px;
        }

        /* Race Mode */
        .race-header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        #trackingHeader {
            margin: 0;
            color: var(--text-main);
            flex-grow: 1;
            text-align: right;
        }

        .ladder-section {
            margin-bottom: 24px;
        }

        .ladder-section h3 {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .control-row {
                grid-template-columns: 1fr;
            }
            .search-input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input-row button {
                width: 100%;
            }
            #trackingHeader {
                text-align: left;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PoE 2 - Ladder Tracker</h1>
        
        <div class="controls-frame">
            <div class="control-row">
                <div class="control-group">
                    <label for="leagueSelect">Ladder</label>
                    <select id="leagueSelect"><option>Fetching leagues...</option></select>
                </div>
                <div class="control-group">
                    <label for="ascendancySelect">Ascendancy</label>
                    <select id="ascendancySelect">
                        <option value="All">All</option>
                        </select>
                </div>
            </div>
            <div class="control-row private-league-row">
                <div class="control-group checkbox-container">
                     <label class="checkbox-label">
                         <input type="checkbox" id="privateLeagueCheck" onchange="togglePrivateLeague()"> 
                         Use Private League
                     </label>
                </div>
                <div class="control-group">
                    <input type="text" id="privateLeagueInput" placeholder="Name of Private League (PLxxxxx)" disabled>
                </div>
            </div>
            <button id="fetchBtn" onclick="fetchCharacters()">Fetch Characters</button>
            <div id="status" class="status-bar">Ready.</div>
        </div>

        <div class="search-frame">
            <label for="charNameInput">Character Name</label>
            <div class="search-input-row">
                <input type="text" id="charNameInput" placeholder="Enter character name">
                <button id="searchBtn" onclick="searchCharacter()">Search Character</button>
                <button id="stopBtn" onclick="stopSearch()" disabled>Stop</button>
                <button id="raceBtn" onclick="startRaceMode()" disabled>Race Mode</button>
            </div>
        </div>

        <div id="resultsBox"></div>
        <button id="showMoreBtn" onclick="showMoreCharacters()" disabled>Show More</button>

        <div id="raceModeContainer" class="hidden">
            <div class="race-header-row">
                <button id="popoutBtn" class="popout-btn" onclick="popoutRaceMode()">Popout</button>
                <label class="checkbox-label">
                    <input type="checkbox" id="autoRefreshCheck" checked onchange="toggleAutoRefresh()"> 
                    Auto Refresh (60s)
                </label>
                <select id="viewModeSelect" onchange="toggleRaceView()">
                    <option value="both">View: Both</option>
                    <option value="ascendancy">View: Ascendancy</option>
                    <option value="global">View: Global</option>
                </select>
                <h2 id="trackingHeader">Tracking: --</h2>
            </div>

            <div class="ladder-section" id="ascSection">
                <h3 id="ascHeader">Ascendancy Ladder</h3>
                <div class="ladder-table" id="ascTable"></div>
            </div>

            <div class="ladder-section" id="globalSection">
                <h3 id="globalHeader">Global Ladder</h3>
                <div class="ladder-table" id="globalTable"></div>
            </div>
            
            <button id="refreshRaceBtn" class="full-width-btn" onclick="updateRaceData()">Refresh Race Data</button>
        </div>
    </div>
    
    <script src="/static/script.js?v=7"></script>
    <script>
        const standardAscendancies = {{ standard_ascendancies|tojson }};
        const temporaryAscendancies = {{ temporary_ascendancies|tojson }};
        const baseClasses = {{ base_classes|tojson }};
        const DROPDOWN_SEPARATOR = "──────────";

        const leagueSelect = document.getElementById('leagueSelect');
        const ascendancySelect = document.getElementById('ascendancySelect');

        function populateAscendancies() {
            const leagueName = leagueSelect.value;
            ascendancySelect.innerHTML = ''; 

            let options = [];
            if (leagueName && leagueName.includes("Phrecia")) {
                options = ["All", ...temporaryAscendancies];
            } else {
                options = ["All", ...standardAscendancies, DROPDOWN_SEPARATOR, ...baseClasses];
            }

            options.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                if (name === DROPDOWN_SEPARATOR) {
                    option.disabled = true;
                }
                ascendancySelect.appendChild(option);
            });
        }

        leagueSelect.addEventListener('change', populateAscendancies);
        
        const observer = new MutationObserver(populateAscendancies);
        observer.observe(leagueSelect, { childList: true });
        
        populateAscendancies();
    </script>
</body>
</html>
